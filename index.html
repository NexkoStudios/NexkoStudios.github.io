<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexko Studios | Energía Digital</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    color:#e2e8f0;
    line-height:1.6;
}

header{
    text-align:center;
    padding:100px 20px;
}

.logo{
    width:160px;
    filter: drop-shadow(0 0 25px #00f2ff);
    animation: glow 2.5s infinite alternate;
}

@keyframes glow {
    from { filter: drop-shadow(0 0 15px #00f2ff); }
    to { filter: drop-shadow(0 0 35px #00f2ff); }
}

h1{
    font-size:3em;
    margin-top:20px;
    color:#00f2ff;
    text-shadow:0 0 15px #00f2ff;
}

.subtitulo{
    margin-top:15px;
    font-size:1.2em;
    color:#94a3b8;
}

.boton-principal{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:#00f2ff;
    color:#000;
    font-weight:bold;
    text-decoration:none;
    border-radius:30px;
    box-shadow:0 0 20px #00f2ff;
    transition:0.3s;
}

.boton-principal:hover{
    background:#38bdf8;
    box-shadow:0 0 30px #00f2ff;
}

section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}

.titulo-seccion{
    text-align:center;
    font-size:2.2em;
    margin-bottom:60px;
    color:#00f2ff;
    text-shadow:0 0 10px #00f2ff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.card{
    background:#0f172a;
    padding:35px;
    border-radius:20px;
    text-align:center;
    border:1px solid #1e293b;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    border:1px solid #00f2ff;
    box-shadow:0 0 20px #00f2ff33;
}

.card h3{
    margin-bottom:15px;
    color:#00f2ff;
}

.contacto{
    text-align:center;
    background:#0f172a;
    padding:50px;
    border-radius:20px;
    border:1px solid #1e293b;
}

.contacto p{
    margin:12px 0;
}

footer{
    text-align:center;
    padding:30px;
    background:#020617;
    color:#64748b;
    margin-top:50px;
}
</style>
</head>
